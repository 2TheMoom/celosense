<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer diamond -->
  <polygon points="100,10 190,100 100,190 10,100" fill="none" stroke="#1F3A8F" stroke-width="10"/>
  <!-- Inner filled diamond -->
  <polygon points="100,30 170,100 100,170 30,100" fill="#1F3A8F"/>
  <!-- Eye white -->
  <ellipse cx="100" cy="100" rx="38" ry="22" fill="#E9E6DF"/>
  <!-- Green pupil -->
  <circle cx="100" cy="100" r="13" fill="#1A6B3C"/>

  <!-- Circuit trace top -->
  <line x1="100" y1="10" x2="100" y2="-10" stroke="#1F3A8F" stroke-width="7" stroke-linecap="round"/>
  <line x1="84" y1="-10" x2="116" y2="-10" stroke="#1F3A8F" stroke-width="7" stroke-linecap="round"/>
  <circle cx="84" cy="-10" r="8" fill="#1A6B3C"/>
  <circle cx="116" cy="-10" r="8" fill="#1A6B3C"/>

  <!-- Circuit trace bottom -->
  <line x1="100" y1="190" x2="100" y2="210" stroke="#1F3A8F" stroke-width="7" stroke-linecap="round"/>
  <line x1="84" y1="210" x2="116" y2="210" stroke="#1F3A8F" stroke-width="7" stroke-linecap="round"/>
  <circle cx="84" cy="210" r="8" fill="#1A6B3C"/>
  <circle cx="116" cy="210" r="8" fill="#1A6B3C"/>

  <!-- Scan lines -->
  <line x1="-20" y1="100" x2="7" y2="100" stroke="#1F3A8F" stroke-width="7" stroke-linecap="round"/>
  <line x1="193" y1="100" x2="220" y2="100" stroke="#1F3A8F" stroke-width="7" stroke-linecap="round"/>
</svg>